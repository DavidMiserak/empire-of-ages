name: empire_of_ages
description: Side-scrolling auto-battler in the Age of War tradition, built on Flutter Casual Games Toolkit + Flame.

# Prevent accidental publishing to pub.dev.
publish_to: 'none'

version: 0.0.1+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  audioplayers: ^6.0.0
  go_router: ^17.0.0
  logging: ^1.2.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  yaml: ^3.1.3
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  flame: ^1.37.0
  flame_audio: ^2.12.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.0
  test: ^1.24.3
  build_runner: ^2.15.0
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/tiny_swords/buildings/
    - assets/images/tiny_swords/resources/
    - assets/images/tiny_swords/terrain/
    - assets/images/tiny_swords/terrain/decorations/
    - assets/images/tiny_swords/units/blue/monk/
    - assets/images/tiny_swords/units/blue/warrior/
    - assets/images/tiny_swords/units/blue/archer/
    - assets/images/tiny_swords/units/blue/lancer/
    - assets/images/tiny_swords/units/red/monk/
    - assets/images/tiny_swords/units/red/warrior/
    - assets/images/tiny_swords/units/red/archer/
    - assets/images/tiny_swords/units/red/lancer/
    - assets/music/
    - assets/sfx/
    - assets/config/

  fonts:
    - family: Permanent Marker
      fonts:
        - asset: assets/fonts/Permanent_Marker/PermanentMarker-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/icon-adaptive-foreground.png"
